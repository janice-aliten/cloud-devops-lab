# cloud-devops-lab — GitLab CI/CD pipeline
#
# GitLab CI equivalent of the GitHub Actions workflow in .github/workflows/validate.yml.
# Demonstrates CI/CD pipeline portability across platforms.
#
# Stages:
#   validate      — Python syntax, Docker Compose config, Terraform init/fmt/validate
#   secret-scan   — Gitleaks full-history secret scan
#   security-scan — Trivy filesystem IaC and container scan
#   build         — Docker image build and push to GitLab Container Registry
#
# The build stage runs only on the default branch after all security checks pass.
# No cloud credentials are required for the validate or scan stages.

stages:
  - validate
  - secret-scan
  - security-scan
  - build

variables:
  TERRAFORM_VERSION: "1.7.5"
  PYTHON_VERSION: "3.11"
  IMAGE_TAG: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  IMAGE_LATEST: "$CI_REGISTRY_IMAGE:latest"

# ── Stage 1: Validate ─────────────────────────────────────────────────────────

python-syntax:
  stage: validate
  image: python:3.11-slim
  script:
    - python -m py_compile app.py
    - python -m py_compile healthcheck.py
    - echo "Python syntax OK"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

docker-compose-validate:
  stage: validate
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker compose config --quiet
    - echo "Docker Compose config OK"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

terraform-validate:
  stage: validate
  image:
    name: hashicorp/terraform:1.7.5
    entrypoint: [""]
  script:
    - cd terraform
    - terraform init -backend=false
    - terraform fmt -check -recursive
    - terraform validate
    - echo "Terraform validation OK"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ── Stage 2: Secret scan ──────────────────────────────────────────────────────

gitleaks:
  stage: secret-scan
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  variables:
    GIT_DEPTH: "0"
  script:
    - gitleaks detect --source . --verbose
  allow_failure: false
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ── Stage 3: Security scan ────────────────────────────────────────────────────

trivy-scan:
  stage: security-scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - |
      trivy fs \
        --severity HIGH,CRITICAL \
        --ignore-unfixed \
        --exit-code 0 \
        .
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ── Stage 4: Build and push ───────────────────────────────────────────────────
# Runs only on the default branch after all validation and security checks pass.
# Pushes to the GitLab Container Registry using built-in CI variables.
# No external secrets or credentials required.

build-and-push:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t "$IMAGE_TAG" -t "$IMAGE_LATEST" .
    - docker push "$IMAGE_TAG"
    - docker push "$IMAGE_LATEST"
    - echo "Image pushed to $IMAGE_TAG"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"'
  needs:
    - python-syntax
    - docker-compose-validate
    - terraform-validate
    - gitleaks
    - trivy-scan