global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert-rules-example.yml"

scrape_configs:
  - job_name: "cloud-devops-lab-app"
    static_configs:
      - targets: ["app:8000"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
