name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ── Job 1: Validate ────────────────────────────────────────────────────────
  # Runs on every push and pull request.
  # Checks Python syntax, Docker Compose config, and Terraform formatting/validation.
  # Does not deploy infrastructure or require cloud credentials.
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python syntax
        run: |
          python -m py_compile app.py
          python -m py_compile healthcheck.py
          echo "Python syntax OK"

      - name: Validate Docker Compose config
        run: |
          docker compose config --quiet
          echo "Docker Compose config OK"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform init (no backend)
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform format check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

  # ── Job 2: Secret scan ─────────────────────────────────────────────────────
  # Scans the full git history for accidentally committed secrets, tokens,
  # or credentials.
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 3: Trivy security scan ─────────────────────────────────────────────
  # Scans the repository filesystem for HIGH and CRITICAL vulnerabilities
  # and misconfigurations in Terraform, Dockerfiles, dependencies, and configs.
  security-scan:
    name: Trivy security scan
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0

  # ── Job 4: Build and push ──────────────────────────────────────────────────
  # Runs only on push to main, after validation and security checks complete.
  # Builds the Docker image and pushes it to GitHub Container Registry.
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs:
      - validate
      - secret-scan
      - security-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}