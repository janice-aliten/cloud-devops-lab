name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ── Job 1: Validate ────────────────────────────────────────────────────────
  # Runs on every push and pull request.
  # Checks Python syntax, Docker Compose config, and Terraform formatting/validation.
  # Does not deploy any infrastructure or require cloud credentials.
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Python syntax check
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python syntax
        run: |
          python -m py_compile app.py
          python -m py_compile healthcheck.py
          echo "Python syntax OK"

      # Docker Compose config validation
      - name: Validate Docker Compose config
        run: |
          docker compose config --quiet
          echo "Docker Compose config OK"

      # Terraform validation sequence (no AWS credentials required)
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform init (no backend)
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform format check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

  # ── Job 2: Build and push ──────────────────────────────────────────────────
  # Runs only on push to main, after validate passes.
  # Builds the Docker image and pushes it to GitHub Container Registry (ghcr.io).
  # Uses GITHUB_TOKEN — no external secrets required.
  # This is the CD step: every merge to main produces a deployable artifact.
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
